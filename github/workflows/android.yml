name: Build Android App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Initialize Android
        run: |
          cordova platform add android
          cordova prepare android

      - name: Generate JKS Key
        run: |
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias my-alias -keypass mypassword -storepass mypassword \
          -dname "CN=Zakaria, OU=Dev, O=SafeCall, L=Tokyo, S=Tokyo, C=JP"

      - name: Build APK and AAB
        run: |
          cordova build android --debug
          cordova build android --release -- --appx

      - name: Sign Files
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
          -keystore release.jks -storepass mypassword \
          platforms/android/app/build/outputs/bundle/release/app-release.aab my-alias

      - name: Upload All Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: SafeCall-Build-Package
          path: |
            release.jks
            platforms/android/app/build/outputs/apk/debug/app-debug.apk
            platforms/android/app/build/outputs/bundle/release/app-release.aab
