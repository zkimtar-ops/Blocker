name: Build and Generate Signing Key

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add Android Platform
        run: cordova platform add android

      - name: Generate JKS Key (Automated)
        run: |
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias my-alias -keypass mypassword -storepass mypassword \
          -dname "CN=Zakaria, OU=Dev, O=SafeCall, L=Tokyo, S=Tokyo, C=JP"

      - name: Build Release AAB
        run: cordova build android --release -- --appx

      - name: Build Debug APK
        run: cordova build android --debug

      - name: Sign AAB with Generated JKS
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
          -keystore release.jks -storepass mypassword \
          platforms/android/app/build/outputs/bundle/release/app-release.aab my-alias

      - name: Upload JKS Key (Save this!)
        uses: actions/upload-artifact@v3
        with:
          name: Generated-Signing-Key-JKS
          path: release.jks

      - name: Upload Signed AAB (For Google Play)
        uses: actions/upload-artifact@v3
        with:
          name: SafeCall-Signed-AAB
          path: platforms/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload Testing APK
        uses: actions/upload-artifact@v3
        with:
          name: SafeCall-Testing-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
