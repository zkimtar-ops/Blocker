name: Final Build V4 - Java 17 - Gradle Fix

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Prepare Android Platform
        run: |
          cordova platform add android@12.0.1
          cordova prepare android

      - name: Fix Gradle Version
        # هذا الأمر يحل مشكلة الصورة 8165 عبر استخدام إصدار جرادل متوافق
        run: |
          cd platforms/android
          ./gradlew wrapper --gradle-version 8.3

      - name: Generate JKS Key
        run: |
          keytool -genkey -v -keystore release.jks -keyalg RSA -keysize 2048 -validity 10000 \
          -alias my-alias -keypass mypassword -storepass mypassword \
          -dname "CN=Zakaria, OU=Dev, O=Blocker, L=Tokyo, S=Tokyo, C=JP"

      - name: Build APK (Debug)
        run: cordova build android --debug

      - name: Build AAB (Release)
        run: cordova build android --release -- --appx

      - name: Sign AAB for Google Play
        run: |
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA256 \
          -keystore release.jks -storepass mypassword \
          platforms/android/app/build/outputs/bundle/release/app-release.aab my-alias

      - name: Upload Final Package (v4)
        uses: actions/upload-artifact@v4
        with:
          name: Blocker-Japan-Complete-Package
          path: |
            release.jks
            platforms/android/app/build/outputs/apk/debug/app-debug.apk
            platforms/android/app/build/outputs/bundle/release/app-release.aab

